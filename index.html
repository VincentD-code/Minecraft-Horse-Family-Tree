<style>
    /* Binder UI Positioning */
    #binder-container {
        position: fixed; top: 5%; right: -380px; width: 380px; height: 85vh;
        transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 10000;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    /* The active class slides the binder in */
    #binder-container.active { right: 0 !important; }

    /* Tab Stack */
    .tab-stack {
        position: absolute; left: -60px; top: 40px;
        display: flex; flex-direction: column; gap: 10px;
    }
    .binder-tab {
        width: 60px; height: 75px; background: #1a1a1a; border: 1px solid #444;
        border-right: none; color: #00F5FF; display: flex; align-items: center;
        justify-content: center; cursor: pointer; border-radius: 12px 0 0 12px;
        font-size: 24px; transition: 0.3s; box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
    }
    .binder-tab:hover { background: #222; width: 65px; left: -5px; }
    .binder-tab.active-tab { background: #121212; color: #FFD700; width: 70px; left: -10px; border-left: 4px solid #FFD700; z-index: 10001; }

    /* Binder Pages */
    .binder-page {
        width: 100%; height: 100%; background: #121212; border: 1px solid #444;
        border-radius: 0 0 0 20px; box-shadow: -15px 15px 40px rgba(0,0,0,0.8);
        padding: 25px; display: none; overflow-y: auto; color: #ffffff;
    }
    .binder-page.active-page { display: block; }
    
    .page-header { border-bottom: 2px solid #333; padding-bottom: 12px; margin-bottom: 20px; font-weight: bold; font-size: 18px; color: #FFD700; }
    
    /* Stats Containers */
    .stat-section { margin-bottom: 20px; padding: 12px; background: #1e1e1e; border-radius: 8px; border-left: 3px solid #00F5FF; }
    .stat-label { font-size: 12px; display: flex; justify-content: space-between; margin-bottom: 8px; color: #eee; font-family: monospace; }
    .bar-bg { background: #000; height: 12px; border-radius: 6px; border: 1px solid #333; overflow: hidden; }
    .bar-fill { background: #00F5FF; height: 100%; transition: 1s ease-out; }
    .bar-fill.gold { background: #FFD700; }

    /* Table Styling */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #888; font-size: 11px; padding-bottom: 10px; }
    td { padding: 12px 8px; border-bottom: 1px solid #222; font-size: 13px; font-family: monospace; color: #fff; cursor: pointer; }
    tr:hover td { background: rgba(0, 245, 255, 0.1); color: #00F5FF; }

    /* Minimize Button at bottom of pages */
    .minimize-btn {
        margin-top: 30px; text-align: center; color: #666; font-size: 11px; 
        cursor: pointer; padding: 10px; border-top: 1px solid #222; transition: 0.2s;
        font-family: monospace;
    }
    .minimize-btn:hover { color: #FF4500; background: rgba(255, 69, 0, 0.05); }
    
    /* Global Overlay UI */
    #mode-ui {
        position:fixed; top:20px; left:20px; z-index:9999; background:rgba(20,20,20,0.95); 
        padding:15px; border:1px solid #444; color:white; font-family:monospace; 
        border-radius:8px; cursor:pointer; user-select:none;
    }

    /* Pie Chart Specific Height */
    .pie-container { height: 260px; width: 100%; margin-bottom: 20px; }
</style>

    document.getElementById('binder-container').classList.toggle('active');
}

function openTab(index) {
    document.getElementById('binder-container').classList.add('active');
    document.querySelectorAll('.binder-page').forEach(p => p.classList.remove('active-page'));
    document.querySelectorAll('.binder-tab').forEach(t => t.classList.remove('active-tab'));

window.addEventListener('load', function() {
    var graphDiv = document.getElementsByClassName('plotly-graph-div')[0];

    // 1. POPULATE LEADERBOARD
    const t16Body = document.getElementById('top-16-body');
    stats.top_16.forEach((h, i) => {
        let row = document.createElement('tr');
        row.innerHTML = `<td>${i+1}</td><td>${h.Name}</td><td style="color:#FFD700; font-weight:bold;">${h.Speed}</td>`;
        row.onclick = () => {
            currentHighlighted = h.Name;
            highlightLogic(h.Name);
        };
        t16Body.appendChild(row);
    });

    // 2. POPULATE GENERATION ANALYTICS
    const genCont = document.getElementById('gen-stats-container');
    const maxSpd = Math.max(...Object.values(stats.avg_speed));
    Object.entries(stats.avg_speed).forEach(([gen, spd]) => {
        let barWidth = (spd / maxSpd) * 100;
        genCont.innerHTML += `<div class="stat-section">
            <div class="stat-label"><span>GEN ${gen}</span><span>${spd}</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${barWidth}%"></div></div>
        </div>`;
    });

    // 3. POPULATE GENETIC PIE CHARTS
    const renderPie = (targetId, dataDict) => {
        const labels = Object.keys(dataDict);
        const values = Object.values(dataDict);
        const colors = labels.map(l => bloodColors[l] || "#444444");

        const data = [{
            values: values,
            labels: labels,
            type: 'pie',
            hole: 0.4,
            marker: { colors: colors, line: { color: '#121212', width: 2 } },
            textinfo: 'percent',
            hoverinfo: 'label+percent',
            textfont: { family: 'monospace', color: '#fff' }
        }];

        const layout = {
            showlegend: true,
            legend: { orientation: 'h', font: { size: 10, color: '#888' }, y: -0.2 },
            margin: { t: 0, b: 0, l: 10, r: 10 },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)'
        };

        Plotly.newPlot(targetId, data, layout, {displayModeBar: false});
    };

    renderPie('pie-alive', stats.blood_alive);
    renderPie('pie-all', stats.blood_all);

    // --- HIGHLIGHTING LOGIC ---
    window.highlightLogic = function(selectedHorse) {
        var targetMap = (currentMode === 'ancestors') ? ancestorMap : descendantMap;
        var relatedSet = targetMap[selectedHorse] || [selectedHorse];
        var newOpacities = []; var newWidths = [];

        for(var i=0; i < graphDiv.data.length; i++){
            var trace = graphDiv.data[i];
            var rawData = Array.isArray(trace.customdata) ? trace.customdata[0] : trace.customdata;
            var traceHorseName = (rawData && typeof rawData === 'object') ? rawData.child : rawData;

            var isRelated = false;
            if (trace.name === "node" || trace.name === "glow") {
                isRelated = relatedSet.includes(traceHorseName);
            } else if (trace.name.includes("line")) {
                isRelated = relatedSet.includes(traceHorseName) && (traceHorseName !== selectedHorse || currentMode === 'ancestors');
            }
            
            newOpacities.push(isRelated ? 1.0 : 0.05);
            newWidths.push(isRelated && trace.name.includes("line") ? 5.0 : (trace.name.includes("line") ? 0.1 : null));
        }
        Plotly.restyle(graphDiv, { 'opacity': newOpacities, 'line.width': newWidths });
    };

    window.toggleMode = function() {
        currentMode = (currentMode === 'ancestors') ? 'descendants' : 'ancestors';
        var txt = document.getElementById('mode-text');
        txt.innerText = currentMode.toUpperCase();
        txt.style.color = (currentMode === 'ancestors') ? '#00F5FF' : '#FF4500';
        if (currentHighlighted) highlightLogic(currentHighlighted);
    };

    function resetToDefault() {
        var ops = graphDiv.data.map(t => t.name === "line_parent" ? 0.3 : (t.name === "line_child" ? 0.45 : (t.name === "glow" ? 0.2 : 1.0)));
        var wds = graphDiv.data.map(t => t.name === "line_child" ? 2.5 : (t.name === "line_parent" ? 1.5 : null));
        Plotly.restyle(graphDiv, { 'opacity': ops, 'line.width': wds });
        currentHighlighted = null;
    }

    document.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'm') toggleMode(); });
    graphDiv.on('plotly_click', function(data){
        if (!data || !data.points) return;
        var pt = data.points[0];
        var raw = pt.customdata;
        var name = (raw && typeof raw === 'object') ? (raw.child || raw[0]) : (Array.isArray(raw) ? raw[0] : raw);
        if (!name) return;
        if (currentHighlighted === name) resetToDefault();
        else { currentHighlighted = name; highlightLogic(name); }
    });
    graphDiv.on('plotly_doubleclick', resetToDefault);
    graphDiv.addEventListener('mousedown', (e) => { if(e.target.classList.contains('nsewdrag')) resetToDefault(); });
});
