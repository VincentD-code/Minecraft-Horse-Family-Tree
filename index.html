var currentMode = 'ancestors';

function showPopup(type) {
    document.getElementById('popup-container').style.display = 'block';
    var content = document.getElementById('popup-content');
    content.innerHTML = '';
    var chartDiv = document.createElement('div');
    chartDiv.style.width = '100%';
    chartDiv.style.height = '100%';
    content.appendChild(chartDiv);
    Plotly.newPlot(chartDiv, charts[type].data, charts[type].layout);
}

function hidePopup() {
    document.getElementById('popup-container').style.display = 'none';
}

window.addEventListener('load', function() {
    var graphDiv = document.getElementsByClassName('plotly-graph-div')[0];
    
    document.getElementById('mode-ui').onclick = function(e) {
        if(e.target.className !== 'data-btn') {
            currentMode = (currentMode === 'ancestors') ? 'descendants' : 'ancestors';
            document.getElementById('mode-text').innerText = 'MODE: ' + currentMode.toUpperCase();
            document.getElementById('mode-text').style.color = (currentMode === 'ancestors') ? '#00F5FF' : '#FF4500';
        }
    };

    graphDiv.on('plotly_click', function(data){
        if (!data || !data.points.length) return;
        var selectedHorse = data.points[0].customdata;
        if (Array.isArray(selectedHorse)) selectedHorse = selectedHorse[0];
        if (typeof selectedHorse === 'object') selectedHorse = selectedHorse.child;

        var targetMap = (currentMode === 'ancestors') ? ancestorMap : descendantMap;
        var relatedSet = targetMap[selectedHorse] || [selectedHorse];
        
        var opacities = [];
        for(var i=0; i<graphDiv.data.length; i++){
            var trace = graphDiv.data[i];
            var traceHorse = Array.isArray(trace.customdata) ? trace.customdata[0] : trace.customdata;
            if(typeof traceHorse === 'object') traceHorse = traceHorse.child;
            
            var isRelated = relatedSet.includes(traceHorse);
            opacities.push(isRelated ? 1.0 : 0.05);
        }
        Plotly.restyle(graphDiv, { 'opacity': opacities });
    });
});
