var graphDiv = document.getElementsByClassName('plotly-graph-div')[0];

function resetToDefault() {
    var opacities = [];
    var widths = [];
    for(var i=0; i<graphDiv.data.length; i++){
        var trace = graphDiv.data[i];
        if (trace.name === "line_parent") opacities.push(0.25);
        else if (trace.name === "line_child") opacities.push(0.45);
        else if (trace.name === "glow") opacities.push(0.2);
        else opacities.push(1.0);
        widths.push(trace.name === "line_child" ? 2.5 : (trace.name === "line_parent" ? 1.5 : null));
    }
    Plotly.restyle(graphDiv, { 'opacity': opacities, 'line.width': widths });
    currentHighlighted = null;
}

graphDiv.on('plotly_click', function(data){
    // Check if we clicked on an actual node
    if (!data.points || !data.points[0].customdata) {
        resetToDefault();
        return;
    }

    var selectedHorse = data.points[0].customdata;
    
    // Toggle off if same horse is clicked
    if (currentHighlighted === selectedHorse) {
        resetToDefault();
        return;
    }

    var ancestors = ancestorMap[selectedHorse] || [];
    currentHighlighted = selectedHorse;
    
    var update = { 'opacity': [], 'line.width': [] };

    for(var i=0; i<graphDiv.data.length; i++){
        var trace = graphDiv.data[i];
        var traceHorse = trace.customdata ? trace.customdata[0] : null;

            update.opacity.push(1.0);
            update['line.width'].push(trace.name.includes("line") ? 5 : null);

            update.opacity.push(0.04);

    Plotly.restyle(graphDiv, update);
});
