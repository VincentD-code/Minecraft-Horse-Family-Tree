var currentMode = 'ancestors'; 
var currentHighlighted = null;

window.addEventListener('load', function() {
    var graphDiv = document.getElementsByClassName('plotly-graph-div')[0];

    function toggleMode() {
        currentMode = (currentMode === 'ancestors') ? 'descendants' : 'ancestors';
        var textEl = document.getElementById('mode-text');
        textEl.innerText = currentMode.toUpperCase();
        textEl.style.color = (currentMode === 'ancestors') ? '#00F5FF' : '#FF4500';
        if (currentHighlighted) highlightLogic(currentHighlighted);
    }

    document.getElementById('mode-ui').onclick = toggleMode;
    document.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'm') toggleMode(); });

    function resetToDefault() {
        var opacities = [];
        var widths = [];
        for(var i=0; i<graphDiv.data.length; i++){
            var trace = graphDiv.data[i];
            if (trace.name === "line_parent") opacities.push(0.20);
            else if (trace.name === "line_child") opacities.push(0.45);
            else if (trace.name === "glow") opacities.push(0.2);
            else opacities.push(1.0);
            widths.push(trace.name === "line_child" ? 2.5 : (trace.name === "line_parent" ? 1.5 : null));
        }
        Plotly.restyle(graphDiv, { 'opacity': opacities, 'line.width': widths });
        currentHighlighted = null;
    }

    function highlightLogic(selectedHorse) {
        var targetMap = (currentMode === 'ancestors') ? ancestorMap : descendantMap;
        var relatedSet = targetMap[selectedHorse] || [selectedHorse];
        
        var update = { 'opacity': [], 'line.width': [] };

        for(var i=0; i<graphDiv.data.length; i++){
            var trace = graphDiv.data[i];
            var data = Array.isArray(trace.customdata) ? trace.customdata[0] : trace.customdata;
            var isRelated = false;

            if (trace.name === "node" || trace.name === "glow") {
                isRelated = (data && relatedSet.includes(data));
            } 
            else if (trace.name.includes("line")) {
                if (currentMode === 'ancestors') {
                    isRelated = relatedSet.includes(data.child);
                } else {
                    isRelated = relatedSet.includes(data.child) && data.child !== selectedHorse;
                }
            }

            if (isRelated) {
                update.opacity.push(1.0);
                update['line.width'].push(trace.name.includes("line") ? 5.5 : null);
            } else {
                update.opacity.push(0.015);
                update['line.width'].push(trace.name.includes("line") ? 0.2 : null);
            }
        }
        Plotly.restyle(graphDiv, update);
    }

    graphDiv.on('plotly_click', function(data){
        if (!data || !data.points || data.points.length === 0) {
            resetToDefault();
            return;
        }

        var rawData = data.points[0].customdata;
        var selectedHorse = (typeof rawData === 'object' && rawData.child) ? rawData.child : (Array.isArray(rawData) ? rawData[0] : rawData);

        if (currentHighlighted === selectedHorse) {
            resetToDefault();
        } else {
            currentHighlighted = selectedHorse;
            highlightLogic(selectedHorse);
        }
    });

    graphDiv.on('plotly_doubleclick', resetToDefault);

    graphDiv.addEventListener('mousedown', function(e) {
        if (e.target.classList.contains('nsewdrag')) {
             resetToDefault();
        }
    });
