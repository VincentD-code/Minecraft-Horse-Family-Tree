name: Update Horse Dynasty Website

on:
  push:
    paths:
      - 'horse_data.csv'
      - '*.py' # Also runs if you update your script
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4 # Fixed: used setup-python action
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy plotly  # Added plotly here

      - name: List files (Debug)
        run: ls -R  # This helps us see if the CSV and PY files are in the right place

      - name: Run Script
        run: python  Attempt 1 # <--- TRIPLE CHECK THIS FILENAME

      - name: Commit and Push index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are changes to avoid erroring out
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update tree" && git push)
