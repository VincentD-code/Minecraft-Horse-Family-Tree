name: Update Horse Dynasty Website

on:
  push:
    paths:
      - 'horse_data.csv'  # Runs only when you change your data
  workflow_dispatch:      # Allows you to run it manually for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy plotly

      - name: Run Script
        run: python your_script_name.py  # <--- CHANGE THIS to your actual .py file name

      - name: Commit and Push index.html
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Auto-update family tree from CSV" || exit 0
          git push
