name: Update Horse Dynasty Website

on:
  push:
    paths:
      - 'horse_data.csv'
      - 'attempt 1' # Runs when you update your main code file
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy plotly

      - name: Run Script
        # We point exactly to the file "attempt 1"
        # If it doesn't have a .py extension, we still run it with python
        run: python "attempt 1"

      - name: Commit and Push index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update tree" && git push)
